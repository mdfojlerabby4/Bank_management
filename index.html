<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Transaction Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            color: #666;
            font-size: 1.1em;
        }

        .data-structures {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .ds-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .auto-save-badge {
            background: #28a745;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-left: 10px;
            display: inline-block;
        }

        /* Navigation */
        .top-nav {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .nav-link {
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: all 0.3s;
            background: #f8f9fa;
            cursor: pointer;
        }

        .nav-link:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-2px);
        }

        .nav-link.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* Main Content */
        .page-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            min-height: 500px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .page-header h2 {
            color: #333;
            font-size: 2em;
        }

        .ds-info {
            background: #e9ecef;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.9em;
            color: #666;
            font-weight: 600;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        /* Table Styles */
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #555;
        }

        table td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        table tr:hover {
            background: #f8f9fa;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .badge-DEPOSIT {
            background: #d4edda;
            color: #155724;
        }

        .badge-WITHDRAW {
            background: #f8d7da;
            color: #721c24;
        }

        .badge-TRANSFER {
            background: #cce5ff;
            color: #004085;
        }

        /* Alert Styles */
        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            animation: slideIn 0.3s ease;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Statistics Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-card h3 {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .stat-card .stat-value {
            color: #333;
            font-size: 2em;
            font-weight: 700;
        }

        .stat-card .stat-label {
            color: #999;
            font-size: 0.8em;
        }

        /* Account Details Card */
        .account-details-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 15px;
            padding: 30px;
            margin-top: 20px;
        }

        .detail-row {
            display: flex;
            padding: 15px;
            border-bottom: 1px solid #dee2e6;
        }

        .detail-label {
            font-weight: 600;
            width: 150px;
            color: #555;
        }

        .detail-value {
            color: #333;
            flex: 1;
        }

        /* Search Box */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            text-align: center;
        }

        .modal-content h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .modal-content p {
            color: #666;
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .save-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9em;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: fadeInOut 2s ease;
            display: none;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏦 Bank Transaction Management System
            </h1>
            <div class="data-structures">
                <span class="ds-badge">🔗 Linked List (Accounts)</span>
                <span class="ds-badge">📚 Stack (Transactions)</span>
                <span class="ds-badge">📋 Queue (Requests)</span>
            </div>
        </header>

        <!-- Navigation Menu -->
        <div class="top-nav">
            <div class="nav-links">
                <a class="nav-link active" onclick="changePage('dashboard', this)">📊 Dashboard</a>
                <a class="nav-link" onclick="changePage('create-account', this)">➕ Create Account</a>
                <a class="nav-link" onclick="changePage('view-accounts', this)">👥 All Accounts</a>
                <a class="nav-link" onclick="changePage('find-account', this)">🔍 Find Account</a>
                <a class="nav-link" onclick="changePage('deposit', this)">💰 Deposit</a>
                <a class="nav-link" onclick="changePage('withdraw', this)">💸 Withdraw</a>
                <a class="nav-link" onclick="changePage('transfer', this)">🔄 Transfer</a>
                <a class="nav-link" onclick="changePage('transactions', this)">📜 Transactions</a>
                <a class="nav-link" onclick="changePage('requests', this)">⏳ Requests</a>
                <a class="nav-link" onclick="changePage('add-request', this)">📝 Add Request</a>
                <a class="nav-link" onclick="undoLastTransaction(this)">↩️ Undo</a>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="page-content" id="mainContent">
            <!-- Dynamic content will be loaded here -->
        </div>
    </div>

    <!-- Save Indicator -->
    <div class="save-indicator" id="saveIndicator">💾 Data Auto-Saved</div>

    <!-- Delete Confirmation Modal -->
    <div class="modal" id="deleteModal">
        <div class="modal-content">
            <h3>⚠️ Confirm Delete</h3>
            <p id="deleteMessage"></p>
            <div class="modal-buttons">
                <button class="btn btn-danger" onclick="confirmDelete()">Yes, Delete</button>
                <button class="btn btn-secondary" onclick="closeDeleteModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // ========== C-STYLE DATA STRUCTURES ==========

        // Account structure (Linked List Node)
        function Account(accNo, name) {
            this.accNo = accNo;
            this.name = name;
            this.balance = 0.0;
            this.next = NULL;
        }

        // Transaction structure (Stack Node)
        function Transaction(id, accNo, type, amount, toAccNo) {
            this.id = id;
            this.accNo = accNo;
            this.type = type;        // "DEPOSIT", "WITHDRAW", "TRANSFER"
            this.amount = amount;
            this.toAccNo = toAccNo || null;
            this.next = NULL;
        }

        // Request structure (Queue Node)
        function Request(id, accNo, type, amount, toAccNo) {
            this.id = id;
            this.accNo = accNo;
            this.type = type;
            this.amount = amount;
            this.toAccNo = toAccNo || null;
            this.next = NULL;
        }

        // NULL pointer in C style
        const NULL = null;

        // ========== GLOBAL VARIABLES (C Style) ==========
        let accountHead = NULL;      // Linked List head pointer
        let transactionTop = NULL;   // Stack top pointer
        let requestFront = NULL;     // Queue front pointer
        let requestRear = NULL;      // Queue rear pointer
        
        let nextTransactionId = 1;
        let nextRequestId = 1;
        
        let accountToDelete = NULL;  // For delete confirmation

        // ========== AUTO-SAVE FUNCTIONS ==========

        function showSaveIndicator() {
            const indicator = document.getElementById('saveIndicator');
            indicator.style.display = 'block';
            setTimeout(() => {
                indicator.style.display = 'none';
            }, 2000);
        }

        function saveToDatabase() {
            const database = {
                accounts: [],
                transactions: [],
                requests: [],
                nextTransactionId: nextTransactionId,
                nextRequestId: nextRequestId
            };

            // Save accounts (Linked List)
            let accTemp = accountHead;
            while (accTemp !== NULL) {
                database.accounts.push({
                    accNo: accTemp.accNo,
                    name: accTemp.name,
                    balance: accTemp.balance
                });
                accTemp = accTemp.next;
            }

            // Save transactions (Stack)
            let transTemp = transactionTop;
            while (transTemp !== NULL) {
                database.transactions.push({
                    id: transTemp.id,
                    accNo: transTemp.accNo,
                    type: transTemp.type,
                    amount: transTemp.amount,
                    toAccNo: transTemp.toAccNo
                });
                transTemp = transTemp.next;
            }

            // Save requests (Queue)
            let reqTemp = requestFront;
            while (reqTemp !== NULL) {
                database.requests.push({
                    id: reqTemp.id,
                    accNo: reqTemp.accNo,
                    type: reqTemp.type,
                    amount: reqTemp.amount,
                    toAccNo: reqTemp.toAccNo
                });
                reqTemp = reqTemp.next;
            }

            localStorage.setItem('bankDatabase', JSON.stringify(database));
            showSaveIndicator();
        }

        function loadFromDatabase() {
            const savedData = localStorage.getItem('bankDatabase');
            if (!savedData) {
                return; // No saved data, start fresh
            }

            const database = JSON.parse(savedData);

            // Clear current data structures
            accountHead = NULL;
            transactionTop = NULL;
            requestFront = NULL;
            requestRear = NULL;

            // Load accounts (rebuild linked list)
            if (database.accounts && database.accounts.length > 0) {
                // Build linked list in original order
                for (let i = 0; i < database.accounts.length; i++) {
                    const acc = database.accounts[i];
                    const newAccount = new Account(acc.accNo, acc.name);
                    newAccount.balance = acc.balance;
                    
                    // Insert at the end
                    if (accountHead === NULL) {
                        accountHead = newAccount;
                    } else {
                        let temp = accountHead;
                        while (temp.next !== NULL) {
                            temp = temp.next;
                        }
                        temp.next = newAccount;
                    }
                }
            }

            // Load transactions (rebuild stack) - reverse to maintain order
            if (database.transactions && database.transactions.length > 0) {
                for (let i = database.transactions.length - 1; i >= 0; i--) {
                    const trans = database.transactions[i];
                    const newTrans = new Transaction(trans.id, trans.accNo, trans.type, trans.amount, trans.toAccNo);
                    
                    // Push to stack
                    newTrans.next = transactionTop;
                    transactionTop = newTrans;
                }
            }

            // Load requests (rebuild queue)
            if (database.requests && database.requests.length > 0) {
                for (let i = 0; i < database.requests.length; i++) {
                    const req = database.requests[i];
                    const newReq = new Request(req.id, req.accNo, req.type, req.amount, req.toAccNo);
                    
                    // Enqueue
                    if (requestRear === NULL) {
                        requestFront = requestRear = newReq;
                    } else {
                        requestRear.next = newReq;
                        requestRear = newReq;
                    }
                }
            }

            nextTransactionId = database.nextTransactionId || 1;
            nextRequestId = database.nextRequestId || 1;
        }

        // ========== UTILITY FUNCTIONS ==========

        function showAlert(message, type = 'success') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            
            const mainContent = document.getElementById('mainContent');
            mainContent.insertBefore(alertDiv, mainContent.firstChild);

            setTimeout(() => {
                alertDiv.remove();
            }, 3000);
        }

        function changePage(page, element) {
            // Update active nav link
            if (element) {
                document.querySelectorAll('.nav-link').forEach(link => {
                    link.classList.remove('active');
                });
                element.classList.add('active');
            }

            // Load appropriate page
            switch(page) {
                case 'dashboard':
                    loadDashboard();
                    break;
                case 'create-account':
                    loadCreateAccount();
                    break;
                case 'view-accounts':
                    loadViewAccounts();
                    break;
                case 'find-account':
                    loadFindAccount();
                    break;
                case 'deposit':
                    loadDeposit();
                    break;
                case 'withdraw':
                    loadWithdraw();
                    break;
                case 'transfer':
                    loadTransfer();
                    break;
                case 'transactions':
                    loadTransactions();
                    break;
                case 'requests':
                    loadRequests();
                    break;
                case 'add-request':
                    loadAddRequest();
                    break;
            }
        }

        // ========== PAGE LOADERS ==========

        function loadDashboard() {
            // Count accounts (traverse linked list)
            let accountCount = 0;
            let totalBalance = 0.0;
            let temp = accountHead;
            while (temp !== NULL) {
                accountCount++;
                totalBalance += temp.balance;
                temp = temp.next;
            }

            // Count transactions (traverse stack)
            let transCount = 0;
            let transTemp = transactionTop;
            while (transTemp !== NULL) {
                transCount++;
                transTemp = transTemp.next;
            }

            // Count requests (traverse queue)
            let reqCount = 0;
            let reqTemp = requestFront;
            while (reqTemp !== NULL) {
                reqCount++;
                reqTemp = reqTemp.next;
            }

            let html = `
                <div class="page-header">
                    <h2>📊 Dashboard</h2>
                    <span class="ds-info">C Style: Linked List + Stack + Queue</span>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Accounts</h3>
                        <div class="stat-value">${accountCount}</div>
                        <div class="stat-label">Linked List</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Transactions</h3>
                        <div class="stat-value">${transCount}</div>
                        <div class="stat-label">Stack</div>
                    </div>
                    <div class="stat-card">
                        <h3>Pending Requests</h3>
                        <div class="stat-value">${reqCount}</div>
                        <div class="stat-label">Queue</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Balance</h3>
                        <div class="stat-value">$${totalBalance.toFixed(2)}</div>
                        <div class="stat-label">All Accounts</div>
                    </div>
                </div>

                <div class="table-container">
                    <h3>Recent Transactions (Last 5)</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Account</th>
                                <th>Type</th>
                                <th>Amount</th>
                                <th>Details</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            let count = 0;
            transTemp = transactionTop;
            while (transTemp !== NULL && count < 5) {
                const acc = findAccount(transTemp.accNo);
                let details = '-';
                if (transTemp.type === 'TRANSFER') {
                    const toAcc = findAccount(transTemp.toAccNo);
                    details = `To: ${transTemp.toAccNo} (${toAcc ? toAcc.name : 'Unknown'})`;
                }

                html += `
                    <tr>
                        <td>${transTemp.id}</td>
                        <td>${transTemp.accNo} (${acc ? acc.name : 'Unknown'})</td>
                        <td><span class="badge badge-${transTemp.type}">${transTemp.type}</span></td>
                        <td>$${transTemp.amount.toFixed(2)}</td>
                        <td>${details}</td>
                    </tr>
                `;
                transTemp = transTemp.next;
                count++;
            }

            if (count === 0) {
                html += '<tr><td colspan="5" style="text-align: center;">No transactions found</td></tr>';
            }

            html += '</tbody></table></div>';
            document.getElementById('mainContent').innerHTML = html;
        }

        function loadCreateAccount() {
            const html = `
                <div class="page-header">
                    <h2>➕ Create New Account</h2>
                    <span class="ds-info">C Style: Linked List</span>
                </div>

                <div class="form-group">
                    <label>Account Number</label>
                    <input type="number" id="accNo" placeholder="e.g., 1001">
                </div>
                <div class="form-group">
                    <label>Account Holder Name (Full Name)</label>
                    <input type="text" id="accName" placeholder="e.g., John Doe">
                </div>
                <button class="btn btn-primary" onclick="createAccount()">Create Account</button>
                <button class="btn btn-secondary" onclick="resetForm()">Reset</button>
            `;
            document.getElementById('mainContent').innerHTML = html;
        }

        function loadViewAccounts() {
            let html = `
                <div class="page-header">
                    <h2>👥 All Accounts</h2>
                    <span class="ds-info">C Style: Linked List</span>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Account No</th>
                                <th>Holder Name</th>
                                <th>Balance</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            let temp = accountHead;
            if (temp === NULL) {
                html += '<tr><td colspan="3" style="text-align: center;">No accounts found</td></tr>';
            } else {
                while (temp !== NULL) {
                    html += `
                        <tr>
                            <td>${temp.accNo}</td>
                            <td>${temp.name}</td>
                            <td>$${temp.balance.toFixed(2)}</td>
                        </tr>
                    `;
                    temp = temp.next;
                }
            }

            html += '</tbody></table></div>';
            document.getElementById('mainContent').innerHTML = html;
        }

        function loadFindAccount() {
            const html = `
                <div class="page-header">
                    <h2>🔍 Find Account Details</h2>
                    <span class="ds-info">C Style: Linked List</span>
                </div>

                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search by Account Number or Name..." onkeyup="searchAccount()">
                    <button class="search-btn" onclick="searchAccount()">Search</button>
                </div>

                <div id="searchResults"></div>
            `;
            document.getElementById('mainContent').innerHTML = html;
        }

        function loadDeposit() {
            const html = `
                <div class="page-header">
                    <h2>💰 Deposit Money</h2>
                    <span class="ds-info">C Style: Stack</span>
                </div>

                <div class="form-group">
                    <label>Account Number</label>
                    <input type="number" id="depositAccount" placeholder="Enter account number">
                </div>
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" id="depositAmount" placeholder="e.g., 5000">
                </div>
                <button class="btn btn-primary" onclick="depositMoney()">Deposit</button>
            `;
            document.getElementById('mainContent').innerHTML = html;
        }

        function loadWithdraw() {
            const html = `
                <div class="page-header">
                    <h2>💸 Withdraw Money</h2>
                    <span class="ds-info">C Style: Stack</span>
                </div>

                <div class="form-group">
                    <label>Account Number</label>
                    <input type="number" id="withdrawAccount" placeholder="Enter account number">
                </div>
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" id="withdrawAmount" placeholder="e.g., 2000">
                </div>
                <button class="btn btn-primary" onclick="withdrawMoney()">Withdraw</button>
            `;
            document.getElementById('mainContent').innerHTML = html;
        }

        function loadTransfer() {
            const html = `
                <div class="page-header">
                    <h2>🔄 Transfer Money</h2>
                    <span class="ds-info">C Style: Stack</span>
                </div>

                <div class="form-group">
                    <label>From Account Number</label>
                    <input type="number" id="fromAccount" placeholder="Enter sender account number">
                </div>
                <div class="form-group">
                    <label>To Account Number</label>
                    <input type="number" id="toAccount" placeholder="Enter receiver account number">
                </div>
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" id="transferAmount" placeholder="e.g., 1000">
                </div>
                <button class="btn btn-primary" onclick="transferMoney()">Transfer</button>
            `;
            document.getElementById('mainContent').innerHTML = html;
        }

        function loadTransactions() {
            let html = `
                <div class="page-header">
                    <h2>📜 Recent Transactions</h2>
                    <span class="ds-info">C Style: Stack</span>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Account</th>
                                <th>Type</th>
                                <th>Amount</th>
                                <th>Details</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            let temp = transactionTop;
            if (temp === NULL) {
                html += '<tr><td colspan="5" style="text-align: center;">No transactions found</td></tr>';
            } else {
                let count = 0;
                while (temp !== NULL && count < 10) {
                    const acc = findAccount(temp.accNo);
                    let details = '-';
                    if (temp.type === 'TRANSFER') {
                        const toAcc = findAccount(temp.toAccNo);
                        details = `To: ${temp.toAccNo} (${toAcc ? toAcc.name : 'Unknown'})`;
                    }

                    html += `
                        <tr>
                            <td>${temp.id}</td>
                            <td>${temp.accNo} (${acc ? acc.name : 'Unknown'})</td>
                            <td><span class="badge badge-${temp.type}">${temp.type}</span></td>
                            <td>$${temp.amount.toFixed(2)}</td>
                            <td>${details}</td>
                        </tr>
                    `;
                    temp = temp.next;
                    count++;
                }
            }

            html += '</tbody></table></div>';
            document.getElementById('mainContent').innerHTML = html;
        }

        function loadRequests() {
            let html = `
                <div class="page-header">
                    <h2>⏳ Pending Requests</h2>
                    <span class="ds-info">C Style: Queue</span>
                </div>

                <div style="margin-bottom: 20px;">
                    <button class="btn btn-primary" onclick="processNextRequest()">Process Next Request</button>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Request ID</th>
                                <th>Account</th>
                                <th>Type</th>
                                <th>Amount</th>
                                <th>Details</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            let temp = requestFront;
            if (temp === NULL) {
                html += '<tr><td colspan="5" style="text-align: center;">No pending requests</td></tr>';
            } else {
                while (temp !== NULL) {
                    const acc = findAccount(temp.accNo);
                    let details = '-';
                    if (temp.type === 'TRANSFER') {
                        const toAcc = findAccount(temp.toAccNo);
                        details = `To: ${temp.toAccNo} (${toAcc ? toAcc.name : 'Unknown'})`;
                    }

                    html += `
                        <tr>
                            <td>${temp.id}</td>
                            <td>${temp.accNo} (${acc ? acc.name : 'Unknown'})</td>
                            <td><span class="badge badge-${temp.type}">${temp.type}</span></td>
                            <td>$${temp.amount.toFixed(2)}</td>
                            <td>${details}</td>
                        </tr>
                    `;
                    temp = temp.next;
                }
            }

            html += '</tbody></table></div>';
            document.getElementById('mainContent').innerHTML = html;
        }

        function loadAddRequest() {
            const html = `
                <div class="page-header">
                    <h2>📝 Add New Request</h2>
                    <span class="ds-info">C Style: Queue</span>
                </div>

                <div class="form-group">
                    <label>Request Type</label>
                    <select id="requestType" onchange="toggleReceiverField()">
                        <option value="DEPOSIT">Deposit</option>
                        <option value="WITHDRAW">Withdraw</option>
                        <option value="TRANSFER">Transfer</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Account Number</label>
                    <input type="number" id="requestAccount" placeholder="e.g., 1001">
                </div>
                <div class="form-group" id="receiverAccountGroup" style="display: none;">
                    <label>Receiver Account Number</label>
                    <input type="number" id="receiverAccount" placeholder="e.g., 1002">
                </div>
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" id="requestAmount" placeholder="e.g., 1000">
                </div>
                <button class="btn btn-primary" onclick="addRequest()">Add Request</button>
            `;
            document.getElementById('mainContent').innerHTML = html;
        }

        // ========== ACCOUNT FUNCTIONS (C Style) ==========

        function createAccount() {
            const accNo = parseInt(document.getElementById('accNo').value);
            const accName = document.getElementById('accName').value.trim();

            if (!accNo || !accName) {
                showAlert('Please enter account number and name!', 'error');
                return;
            }

            // Check if account already exists (traverse linked list)
            let temp = accountHead;
            while (temp !== NULL) {
                if (temp.accNo === accNo) {
                    showAlert('Account number already exists!', 'error');
                    return;
                }
                temp = temp.next;
            }

            // Create new account node
            const newAccount = new Account(accNo, accName);
            
            // Insert at the end (C style)
            if (accountHead === NULL) {
                accountHead = newAccount;
            } else {
                temp = accountHead;
                while (temp.next !== NULL) {
                    temp = temp.next;
                }
                temp.next = newAccount;
            }

            showAlert(`Account ${accNo} (${accName}) created successfully!`);
            document.getElementById('accNo').value = '';
            document.getElementById('accName').value = '';
            
            // Auto-save to database
            saveToDatabase();
        }

        function findAccount(accNo) {
            let temp = accountHead;
            while (temp !== NULL) {
                if (temp.accNo === accNo) return temp;
                temp = temp.next;
            }
            return NULL;
        }

        function searchAccount() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const resultsDiv = document.getElementById('searchResults');

            if (!searchTerm) {
                resultsDiv.innerHTML = '';
                return;
            }

            // Search by account number or name
            let results = [];
            let temp = accountHead;
            while (temp !== NULL) {
                if (temp.accNo.toString().includes(searchTerm) || 
                    temp.name.toLowerCase().includes(searchTerm)) {
                    results.push(temp);
                }
                temp = temp.next;
            }

            if (results.length === 0) {
                resultsDiv.innerHTML = '<p style="text-align: center; color: #666;">No accounts found</p>';
                return;
            }

            let html = '';
            results.forEach(acc => {
                // Find recent transactions for this account
                let transactions = [];
                let transTemp = transactionTop;
                while (transTemp !== NULL && transactions.length < 3) {
                    if (transTemp.accNo === acc.accNo || (transTemp.type === 'TRANSFER' && transTemp.toAccNo === acc.accNo)) {
                        transactions.push(transTemp);
                    }
                    transTemp = transTemp.next;
                }

                let transactionsHtml = '';
                if (transactions.length > 0) {
                    transactionsHtml = '<h4 style="margin: 20px 0 10px;">Recent Transactions</h4><table><tr><th>ID</th><th>Type</th><th>Amount</th><th>Details</th></tr>';
                    transactions.forEach(t => {
                        let details = '-';
                        if (t.type === 'TRANSFER') {
                            if (t.accNo === acc.accNo) {
                                details = `Sent to: ${t.toAccNo}`;
                            } else {
                                details = `Received from: ${t.accNo}`;
                            }
                        }
                        transactionsHtml += `<tr>
                            <td>${t.id}</td>
                            <td><span class="badge badge-${t.type}">${t.type}</span></td>
                            <td>$${t.amount.toFixed(2)}</td>
                            <td>${details}</td>
                        </tr>`;
                    });
                    transactionsHtml += '</table>';
                }

                html += `
                    <div class="account-details-card">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                            <h3>Account Details</h3>
                            <button class="btn btn-danger" onclick="showDeleteConfirmation(${acc.accNo})">Delete Account</button>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Account Number:</div>
                            <div class="detail-value">${acc.accNo}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Holder Name:</div>
                            <div class="detail-value">${acc.name}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Current Balance:</div>
                            <div class="detail-value">$${acc.balance.toFixed(2)}</div>
                        </div>
                        ${transactionsHtml}
                    </div>
                `;
            });

            resultsDiv.innerHTML = html;
        }

        function showDeleteConfirmation(accNo) {
            const acc = findAccount(accNo);
            if (acc === NULL) return;

            accountToDelete = accNo;
            const modal = document.getElementById('deleteModal');
            const message = document.getElementById('deleteMessage');
            
            if (acc.balance > 0) {
                message.textContent = `Account ${accNo} has balance $${acc.balance}. Are you sure you want to delete?`;
            } else {
                message.textContent = `Are you sure you want to delete account ${accNo}?`;
            }
            
            modal.classList.add('active');
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('active');
            accountToDelete = NULL;
        }

        function confirmDelete() {
            if (accountToDelete === NULL) return;

            let temp = accountHead;
            let prev = NULL;

            while (temp !== NULL && temp.accNo !== accountToDelete) {
                prev = temp;
                temp = temp.next;
            }

            if (temp !== NULL) {
                if (prev === NULL) {
                    accountHead = temp.next;
                } else {
                    prev.next = temp.next;
                }
                showAlert(`Account ${accountToDelete} deleted successfully!`);
            }

            closeDeleteModal();
            searchAccount(); // Refresh search results
            saveToDatabase(); // Auto-save after delete
        }

        // ========== TRANSACTION FUNCTIONS (Stack - C Style) ==========

        function pushTransaction(accNo, type, amount, toAccNo) {
            const newTrans = new Transaction(nextTransactionId++, accNo, type, amount, toAccNo);
            // Push to top of stack
            newTrans.next = transactionTop;
            transactionTop = newTrans;
        }

        function undoLastTransaction(element) {
            if (transactionTop === NULL) {
                showAlert('No transactions to undo!', 'error');
                return;
            }

            const lastTrans = transactionTop;
            const acc = findAccount(lastTrans.accNo);

            if (acc !== NULL) {
                if (lastTrans.type === 'DEPOSIT') {
                    acc.balance -= lastTrans.amount;
                    showAlert(`Undo Deposit: $${lastTrans.amount} reversed`);
                } else if (lastTrans.type === 'WITHDRAW') {
                    acc.balance += lastTrans.amount;
                    showAlert(`Undo Withdrawal: $${lastTrans.amount} reversed`);
                } else if (lastTrans.type === 'TRANSFER') {
                    const fromAcc = findAccount(lastTrans.accNo);
                    const toAcc = findAccount(lastTrans.toAccNo);
                    if (fromAcc !== NULL && toAcc !== NULL) {
                        fromAcc.balance += lastTrans.amount;
                        toAcc.balance -= lastTrans.amount;
                        showAlert(`Undo Transfer: $${lastTrans.amount} reversed`);
                    }
                }
            }

            // Pop from stack
            transactionTop = lastTrans.next;
            
            // Update active state
            if (element) {
                document.querySelectorAll('.nav-link').forEach(link => {
                    link.classList.remove('active');
                });
                element.classList.add('active');
            }
            
            loadDashboard();
            saveToDatabase(); // Auto-save after undo
        }

        // ========== QUEUE FUNCTIONS (Queue - C Style) ==========

        function enqueueRequest(accNo, type, amount, toAccNo) {
            const newRequest = new Request(nextRequestId++, accNo, type, amount, toAccNo);

            if (requestRear === NULL) {
                requestFront = requestRear = newRequest;
            } else {
                requestRear.next = newRequest;
                requestRear = newRequest;
            }

            showAlert(`Request #${newRequest.id} added to queue!`, 'info');
        }

        function processNextRequest() {
            if (requestFront === NULL) {
                showAlert('No pending requests!', 'error');
                return;
            }

            const current = requestFront;
            const acc = findAccount(current.accNo);

            if (acc === NULL) {
                showAlert(`Account ${current.accNo} not found!`, 'error');
            } else {
                if (current.type === 'DEPOSIT') {
                    acc.balance += current.amount;
                    pushTransaction(current.accNo, 'DEPOSIT', current.amount, NULL);
                    showAlert(`Deposit Request #${current.id} processed`);
                } 
                else if (current.type === 'WITHDRAW') {
                    if (acc.balance >= current.amount) {
                        acc.balance -= current.amount;
                        pushTransaction(current.accNo, 'WITHDRAW', current.amount, NULL);
                        showAlert(`Withdrawal Request #${current.id} processed`);
                    } else {
                        showAlert(`Insufficient balance! (Current: $${acc.balance})`, 'error');
                    }
                }
                else if (current.type === 'TRANSFER') {
                    const toAcc = findAccount(current.toAccNo);
                    if (toAcc === NULL) {
                        showAlert(`Receiver account ${current.toAccNo} not found!`, 'error');
                    } else if (acc.balance >= current.amount) {
                        acc.balance -= current.amount;
                        toAcc.balance += current.amount;
                        pushTransaction(current.accNo, 'TRANSFER', current.amount, current.toAccNo);
                        showAlert(`Transfer Request #${current.id} processed`);
                    } else {
                        showAlert(`Insufficient balance! (Current: $${acc.balance})`, 'error');
                    }
                }
            }

            // Dequeue (remove from front)
            requestFront = current.next;
            if (requestFront === NULL) {
                requestRear = NULL;
            }

            loadRequests();
            saveToDatabase(); // Auto-save after processing
        }

        // ========== BANK OPERATIONS ==========

        function depositMoney() {
            const accNo = parseInt(document.getElementById('depositAccount').value);
            const amount = parseFloat(document.getElementById('depositAmount').value);

            if (!accNo) {
                showAlert('Please enter account number!', 'error');
                return;
            }

            if (!amount || amount <= 0) {
                showAlert('Please enter a valid amount!', 'error');
                return;
            }

            const acc = findAccount(accNo);
            if (acc === NULL) {
                showAlert(`Account ${accNo} not found!`, 'error');
                return;
            }

            acc.balance += amount;
            pushTransaction(acc.accNo, 'DEPOSIT', amount, NULL);
            showAlert(`$${amount} deposited successfully!`);
            
            document.getElementById('depositAccount').value = '';
            document.getElementById('depositAmount').value = '';
            
            saveToDatabase(); // Auto-save after deposit
        }

        function withdrawMoney() {
            const accNo = parseInt(document.getElementById('withdrawAccount').value);
            const amount = parseFloat(document.getElementById('withdrawAmount').value);

            if (!accNo) {
                showAlert('Please enter account number!', 'error');
                return;
            }

            if (!amount || amount <= 0) {
                showAlert('Please enter a valid amount!', 'error');
                return;
            }

            const acc = findAccount(accNo);
            if (acc === NULL) {
                showAlert(`Account ${accNo} not found!`, 'error');
                return;
            }

            if (acc.balance >= amount) {
                acc.balance -= amount;
                pushTransaction(acc.accNo, 'WITHDRAW', amount, NULL);
                showAlert(`$${amount} withdrawn successfully!`);
                
                document.getElementById('withdrawAccount').value = '';
                document.getElementById('withdrawAmount').value = '';
                
                saveToDatabase(); // Auto-save after withdrawal
            } else {
                showAlert(`Insufficient balance! (Current: $${acc.balance})`, 'error');
            }
        }

        function transferMoney() {
            const fromAccNo = parseInt(document.getElementById('fromAccount').value);
            const toAccNo = parseInt(document.getElementById('toAccount').value);
            const amount = parseFloat(document.getElementById('transferAmount').value);

            if (!fromAccNo || !toAccNo) {
                showAlert('Please enter both account numbers!', 'error');
                return;
            }

            if (fromAccNo === toAccNo) {
                showAlert('Sender and receiver cannot be the same!', 'error');
                return;
            }

            if (!amount || amount <= 0) {
                showAlert('Please enter a valid amount!', 'error');
                return;
            }

            const fromAcc = findAccount(fromAccNo);
            const toAcc = findAccount(toAccNo);

            if (fromAcc === NULL) {
                showAlert(`Sender account ${fromAccNo} not found!`, 'error');
                return;
            }

            if (toAcc === NULL) {
                showAlert(`Receiver account ${toAccNo} not found!`, 'error');
                return;
            }

            if (fromAcc.balance >= amount) {
                fromAcc.balance -= amount;
                toAcc.balance += amount;
                pushTransaction(fromAcc.accNo, 'TRANSFER', amount, toAcc.accNo);
                showAlert(`$${amount} transferred successfully!`);
                
                document.getElementById('fromAccount').value = '';
                document.getElementById('toAccount').value = '';
                document.getElementById('transferAmount').value = '';
                
                saveToDatabase(); // Auto-save after transfer
            } else {
                showAlert(`Insufficient balance in sender account! (Current: $${fromAcc.balance})`, 'error');
            }
        }

        function addRequest() {
            const type = document.getElementById('requestType').value;
            const accNo = parseInt(document.getElementById('requestAccount').value);
            const amount = parseFloat(document.getElementById('requestAmount').value);
            const toAccNo = document.getElementById('receiverAccount') ? 
                           parseInt(document.getElementById('receiverAccount').value) : null;

            if (!accNo || !amount || amount <= 0) {
                showAlert('Please enter valid account number and amount!', 'error');
                return;
            }

            if (type === 'TRANSFER' && !toAccNo) {
                showAlert('Please enter receiver account number!', 'error');
                return;
            }

            if (type === 'TRANSFER' && accNo === toAccNo) {
                showAlert('Sender and receiver cannot be the same!', 'error');
                return;
            }

            enqueueRequest(accNo, type, amount, toAccNo);
            
            document.getElementById('requestAccount').value = '';
            document.getElementById('requestAmount').value = '';
            if (document.getElementById('receiverAccount')) {
                document.getElementById('receiverAccount').value = '';
            }
            
            saveToDatabase(); // Auto-save after adding request
        }

        function toggleReceiverField() {
            const type = document.getElementById('requestType').value;
            const receiverGroup = document.getElementById('receiverAccountGroup');
            if (receiverGroup) {
                receiverGroup.style.display = type === 'TRANSFER' ? 'block' : 'none';
            }
        }

        function resetForm() {
            document.getElementById('accNo').value = '';
            document.getElementById('accName').value = '';
        }

        // Load from database on startup
        window.onload = function() {
            loadFromDatabase();
            loadDashboard();
        };
    </script>
